name: Ticket Monitor

on:
  schedule:
    - cron: "*/10 * * * *"  # every 10 minutes
  workflow_dispatch:         # allow manual trigger
  push:
    branches:
      - main

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to commit monitor_state.json back

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Chromium system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libxkbcommon0 libxcomposite1 \
            libxdamage1 libxfixes3 libxrandr2 libgbm1 \
            libasound2t64

      - name: Install Playwright browser
        run: python -m playwright install chromium

      - name: Run monitor (single pass)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -c "import monitor; monitor.run_once(monitor.load_config())"

      - name: Save monitor state
        run: |
          if [ -f monitor_state.json ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add monitor_state.json
            git diff --cached --quiet || git commit -m "chore: update monitor_state.json [skip ci]"
            git pull --rebase origin main
            git push
          fi
